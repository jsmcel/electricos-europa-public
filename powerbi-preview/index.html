ype":"model","key":"Xpeng G6 Long Range","label":"Xpeng G6 Long Range","hint":"Xpeng"},{"type":"model","key":"Xpeng G6 Standard Range","label":"Xpeng G6 Standard Range","hint":"Xpeng"},{"type":"model","key":"Yudo 3","label":"Yudo 3","hint":"Yudo"},{"type":"model","key":"Jj2000dbp","label":"Jj2000dbp","hint":"Yunlong"},{"type":"model","key":"Jj5000bu","label":"Jj5000bu","hint":"Yunlong"},{"type":"model","key":"Ic15e","label":"Ic15e","hint":"Yutong"},{"type":"model","key":"T14e","label":"T14e","hint":"Yutong"},{"type":"model","key":"U 12","label":"U 12","hint":"Yutong"},{"type":"model","key":"U10","label":"U10","hint":"Yutong"},{"type":"model","key":"U12","label":"U12","hint":"Yutong"},{"type":"model","key":"U15","label":"U15","hint":"Yutong"},{"type":"model","key":"U18","label":"U18","hint":"Yutong"},{"type":"model","key":"001","label":"001","hint":"Zeekr"},{"type":"model","key":"1","label":"1","hint":"Zeekr"},{"type":"model","key":"7gt","label":"7gt","hint":"Zeekr"},{"type":"model","key":"7x","label":"7x","hint":"Zeekr"},{"type":"model","key":"X","label":"X","hint":"Zeekr"},{"type":"model","key":"Zhidou","label":"Zhidou","hint":"Zhidou"},{"type":"model","key":"Fabrikat","label":"Fabrikat","hint":"öVriga"}]};</script>
  <script>
const DATA = window.POWERBI_PREVIEW_DATA;
const fmt = new Intl.NumberFormat("es-ES");
const compact = new Intl.NumberFormat("es-ES", { notation: "compact", maximumFractionDigits: 1 });
const state = { page: "briefing", country: DATA.defaultCountry, search: "", drive: "all", brand: null, model: null };
const byCountry = new Map(DATA.countries.map((country) => [country.code, country]));
const maxCountryTotal = Math.max(...DATA.countries.filter((c) => c.code !== "EU27").map((c) => c.latest_total));
const MOBILE_QUERY = "(max-width: 760px)";
const ES_NAMES = { AT: "Austria", BE: "Bélgica", BG: "Bulgaria", CH: "Suiza", CY: "Chipre", CZ: "Chequia", DE: "Alemania", DK: "Dinamarca", EE: "Estonia", ES: "España", EU27: "Unión Europea (UE27)", FI: "Finlandia", FR: "Francia", GB: "Reino Unido", GR: "Grecia", HR: "Croacia", HU: "Hungría", IE: "Irlanda", IS: "Islandia", IT: "Italia", LI: "Liechtenstein", LT: "Lituania", LU: "Luxemburgo", LV: "Letonia", MT: "Malta", NL: "Países Bajos", NO: "Noruega", PL: "Polonia", PT: "Portugal", RO: "Rumanía", SE: "Suecia", SI: "Eslovenia", SK: "Eslovaquia", TR: "Turquía" };
let wasMobile = isMobileView();

function isMobileView() { return window.matchMedia(MOBILE_QUERY).matches; }
function displayName(country) { return country ? (ES_NAMES[country.code] || country.name) : ""; }

init();

function init() {
  applyHash();

  DATA.searchIndex.forEach((item) => {
    if (item.type === "country") item.label = ES_NAMES[item.key] || item.label;
  });
  const searchList = document.getElementById("searchList");
  searchList.innerHTML = DATA.searchIndex.slice(0, 400).map((item) => {
    const value = escapeHtml(item.label);
    return '<option value="' + value + '">' + escapeHtml(item.hint) + '</option>';
  }).join("");

  document.querySelectorAll("[data-page]").forEach((button) => {
    button.addEventListener("click", () => setPage(button.dataset.page));
  });

  const searchBox = document.getElementById("searchBox");
  searchBox.addEventListener("change", () => applySearch(searchBox.value));
  searchBox.addEventListener("keydown", (event) => {
    if (event.key === "Enter") applySearch(searchBox.value);
  });

  document.querySelectorAll("[data-drive]").forEach((button) => {
    button.addEventListener("click", () => setDrive(button.dataset.drive));
  });

  const countrySlicer = document.getElementById("countrySlicer");
  if (countrySlicer) {
    const modelSet = new Set(DATA.modelCountries || []);
    const opts = DATA.countries
      .filter((c) => c.code !== "EU27")
      .sort((a, b) => (modelSet.has(b.code) - modelSet.has(a.code)) || displayName(a).localeCompare(displayName(b)))
      .map((c) => '<option value="' + c.code + '">' + escapeHtml(displayName(c)) + (modelSet.has(c.code) ? "" : " · sin modelos") + '</option>')
      .join("");
    countrySlicer.innerHTML = opts;
    countrySlicer.addEventListener("change", (event) => setCountry(event.target.value, state.page));
  }

  window.addEventListener("resize", () => {
    const nowMobile = isMobileView();
    if (nowMobile !== wasMobile) {
      wasMobile = nowMobile;
      render(false);
    } else {
      resizeStage();
    }
  }, { passive: true });
  window.addEventListener("hashchange", () => {
    if (location.hash === buildHash()) return;
    if (applyHash()) render(false);
  });
  render();
}

// Deep links: page plus country/brand/model travel in the hash so any filtered view is shareable.
function buildHash() {
  const params = new URLSearchParams();
  if (["pais", "modelos", "marcas"].includes(state.page)) params.set("c", state.country);
  if (state.brand) params.set("b", state.brand);
  if (state.model) { params.set("mb", state.model.brand); params.set("mm", state.model.model); }
  const query = params.toString();
  return "#" + state.page + (query ? "?" + query : "");
}

function applyHash() {
  const raw = location.hash.replace(/^#/, "");
  const splitAt = raw.indexOf("?");
  const page = normalizePage(splitAt === -1 ? raw : raw.slice(0, splitAt));
  if (!page) return false;
  state.page = page;
  const params = new URLSearchParams(splitAt === -1 ? "" : raw.slice(splitAt + 1));
  const country = params.get("c");
  if (country && byCountry.has(country)) state.country = country;
  const brand = params.get("b");
  state.brand = page === "modelos" && brand ? brand : null;
  const mb = params.get("mb"), mm = params.get("mm");
  state.model = page === "modelos" && mb && mm && findModel(mb, mm) ? { brand: mb, model: mm } : null;
  return true;
}

function setPage(page, syncUrl = true) {
  if (!normalizePage(page)) return;
  state.page = page;
  state.search = "";
  if (page !== "modelos") { state.brand = null; state.model = null; }
  render(syncUrl);
}

function setDrive(drive) {
  if (!["all", "bev", "phev"].includes(drive)) return;
  state.drive = drive;
  render(false);
}

function driveVal(bev, phev, total) {
  const b = Number(bev) || 0;
  const p = Number(phev) || 0;
  if (state.drive === "bev") return b;
  if (state.drive === "phev") return p;
  return total === undefined ? b + p : Number(total) || 0;
}
function driveCountry(country) { return driveVal(country.latest_bev, country.latest_phev, country.latest_total); }
function driveColor() { return state.drive === "bev" ? DATA.colors.bev : state.drive === "phev" ? DATA.colors.phev : null; }
function driveMaxCountry() { return Math.max(1, ...DATA.countries.filter((c) => c.code !== "EU27").map(driveCountry)); }
function driveRow(row) { return driveVal(row.bev, row.phev, row.registrations); }
function driveBar(x, y, bar, h, bev, total) {
  const solid = driveColor();
  if (solid) return '<rect x="' + x + '" y="' + y + '" width="' + bar.toFixed(1) + '" height="' + h + '" fill="' + solid + '"/>';
  const bevBar = bar * (Number(bev) / Math.max(1, Number(total)));
  return '<rect x="' + x + '" y="' + y + '" width="' + bar.toFixed(1) + '" height="' + h + '" fill="' + DATA.colors.phev + '" opacity=".78"/>'
    + '<rect x="' + x + '" y="' + y + '" width="' + bevBar.toFixed(1) + '" height="' + h + '" fill="' + DATA.colors.bev + '"/>';
}

function pctOf(value, total) { return total > 0 ? (Number(value) / total) * 100 : 0; }
function currentCountry() { return byCountry.get(state.country) || {}; }
// Share of the *currently filtered* market so the number always matches the visible bar:
// Todos -> del enchufable total, BEV -> del mercado BEV, PHEV -> del mercado PHEV.
function driveMarketLabel() {
  return state.drive === "bev" ? "del mercado BEV" : state.drive === "phev" ? "del mercado PHEV" : "del mercado enchufable";
}
function rowShare(row) { return pctOf(driveRow(row), driveCountry(currentCountry())); }
function modelShareLabel(row) { return fmtPct(rowShare(row)) + " " + driveMarketLabel(); }

function svgTitle(name, bev, phev, hint) {
  const b = Number(bev) || 0, p = Number(phev) || 0;
  let text = name + " — BEV " + fmt.format(b) + " · PHEV " + fmt.format(p) + " · total " + fmt.format(b + p);
  if (hint) text += " · " + hint;
  return "<title>" + escapeHtml(text) + "</title>";
}

function splitMini(bev, phev) {
  const b = Number(bev) || 0, p = Number(phev) || 0;
  const bw = (b / Math.max(1, b + p)) * 100;
  return '<i class="s-bev" style="width:' + bw.toFixed(1) + '%"></i><i class="s-phev" style="width:' + (100 - bw).toFixed(1) + '%"></i>';
}
function specItem(label, value, unit) {
  const n = Number(value);
  if (value === "" || value === undefined || value === null || !isFinite(n) || n <= 0) return "";
  return '<div class="spec"><span class="spec-k">' + label + '</span><span class="spec-v">' + fmt.format(n) + (unit ? '<i>' + unit + '</i>' : '') + '</span></div>';
}
function modelDetailCard(row) {
  const bev = Number(row.bev) || 0, phev = Number(row.phev) || 0, total = Number(row.registrations) || 0;
  const pw = String(row.dominant_powertrain || "");
  const specs = [
    specItem("Potencia media", row.avg_kw, " kW"),
    specItem("Autonomía media", row.avg_range_km, " km"),
    specItem("CO₂ medio", row.avg_co2_g_km, " g/km"),
    specItem("Masa media", row.avg_mass_kg, " kg"),
    specItem("Cuota de renting", row.renting_share_pct, "%"),
    specItem("Variantes a la venta", row.variant_count, ""),
    specItem("Provincias con ventas", row.area_count, ""),
    specItem("Puesto en su marca", row.rank_within_brand, "º"),
  ].filter(Boolean).join("");
  return '<div class="detail-card">'
    + '<div class="detail-top"><button type="button" class="detail-back" id="clearModel">‹ Volver al ranking</button>'
    + (pw ? '<span class="pw-badge ' + pw + '">' + escapeHtml(pw) + '</span>' : '') + '</div>'
    + '<div class="detail-name">' + escapeHtml(modelTitle(row, false)) + '</div>'
    + '<div class="detail-hero"><b>' + fmt.format(driveRow(row)) + '</b><span>' + fmtPct(rowShare(row)) + ' ' + driveMarketLabel() + ' · ' + escapeHtml(displayName(currentCountry())) + '</span></div>'
    + '<div class="detail-split">' + splitMini(bev, phev) + '</div>'
    + '<div class="detail-splitlbl"><span>BEV ' + fmt.format(bev) + ' · ' + fmtPct(pctOf(bev, total)) + '</span><span>PHEV ' + fmt.format(phev) + ' · ' + fmtPct(pctOf(phev, total)) + '</span></div>'
    + (specs ? '<div class="spec-grid">' + specs + '</div>' : '<div class="detail-note">Sin ficha técnica pública para este mercado. Las specs (potencia, autonomía, CO₂, masa) están disponibles en España y, en parte, en Bélgica.</div>')
    + '</div>';
}

function findModel(brand, model) {
  return (DATA.modelByCountry[state.country] || []).find((r) => r.brand === brand && r.model === model) || null;
}
function selectedModelRow() { return state.model ? findModel(state.model.brand, state.model.model) : null; }
function setModel(brand, model) {
  state.model = findModel(brand, model) ? { brand: brand, model: model } : null;
  state.page = "modelos";
  render(true);
}
function clearModel() { state.model = null; render(true); }

function setBrand(brand) {
  state.brand = brand || null;
  state.model = null;
  state.page = "modelos";
  state.search = "";
  render(true);
}
function clearBrand() { state.brand = null; render(true); }
function brandChipInline() {
  if (!state.brand) return "";
  return '<span class="chip chip-filter">Marca: ' + escapeHtml(brandLabel(state.brand))
    + '<button type="button" class="chip-x" id="clearBrand" aria-label="Quitar filtro de marca">×</button></span>';
}
function bindDrill(root) {
  const scope = root || document;
  scope.querySelectorAll(".brand-row[data-brand]").forEach((el) => {
    el.addEventListener("click", () => setBrand(el.dataset.brand));
  });
  scope.querySelectorAll(".model-row[data-model]").forEach((el) => {
    el.addEventListener("click", () => setModel(el.dataset.brand, el.dataset.model));
  });
  const cb = scope.querySelector("#clearBrand");
  if (cb) cb.addEventListener("click", (event) => { event.stopPropagation(); clearBrand(); });
  const cm = scope.querySelector("#clearModel");
  if (cm) cm.addEventListener("click", (event) => { event.stopPropagation(); clearModel(); });
}

function setCountry(code, page = "pais", syncUrl = true) {
  if (byCountry.has(code)) state.country = code;
  state.page = page;
  state.search = "";
  state.brand = null;
  state.model = null;
  render(syncUrl);
}

function countryWith(group, field, key) {
  const wanted = String(key).toLowerCase();
  const has = (code) => (group[code] || []).some((row) => String(row[field]).toLowerCase() === wanted);
  if (has(state.country)) return state.country;
  return (DATA.modelCountries || []).find(has) || state.country;
}

function applySearch(value) {
  const query = value.trim().toLowerCase();
  if (!query) return;
  const item = DATA.searchIndex.find((candidate) => candidate.label.toLowerCase() === query)
    || DATA.searchIndex.find((candidate) => candidate.label.toLowerCase().includes(query));
  if (!item) return;
  if (item.type === "country") {
    setCountry(item.key, "pais");
    return;
  }
  // Brand/model: jump to a market that actually publishes it, and highlight the row.
  if (item.type === "brand") {
    state.country = countryWith(DATA.brandByCountry, "brand", item.key);
    state.page = "marcas";
  } else {
    state.country = countryWith(DATA.modelByCountry, "model", item.key);
    state.page = "modelos";
  }
  state.brand = null;
  state.model = null;
  state.search = item.key;
  render(true);
}

function render(syncUrl = true) {
  if (syncUrl && location.hash !== buildHash()) {
    history.replaceState(null, "", buildHash());
  }
  const mobile = isMobileView();
  document.body.classList.toggle("is-mobile", mobile);
  document.querySelectorAll(".tabs button").forEach((button) => {
    const active = button.dataset.page === state.page;
    button.classList.toggle("active", active);
    if (active) button.setAttribute("aria-current", "page");
    else button.removeAttribute("aria-current");
  });
  document.querySelectorAll(".page").forEach((page) => page.classList.remove("active"));
  document.getElementById("page-" + state.page).classList.add("active");
  const showSlicer = ["europa", "pais", "modelos", "marcas"].includes(state.page);
  const slicerbar = document.getElementById("slicerbar");
  if (slicerbar) slicerbar.hidden = !showSlicer;
  document.querySelectorAll("[data-drive]").forEach((button) => {
    button.classList.toggle("active", button.dataset.drive === state.drive);
  });
  const countryWrap = document.getElementById("countrySlicerWrap");
  if (countryWrap) countryWrap.hidden = mobile || !["pais", "modelos", "marcas"].includes(state.page);
  const countrySlicer = document.getElementById("countrySlicer");
  if (countrySlicer && countrySlicer.value !== state.country) countrySlicer.value = state.country;
  renderBriefing();
  renderEuropa();
  renderPais();
  renderModelos();
  renderMarcas();
  renderGlobal();
  resizeStage();
  if (mobile) {
    const scroller = document.scrollingElement || document.documentElement;
    if (scroller) scroller.scrollTop = 0;
  }
}

function resizeStage() {
  const wrap = document.getElementById("stageWrap");
  const stage = document.getElementById("stage");
  if (!wrap || !stage) return;
  if (isMobileView()) {
    stage.style.transform = "none";
    stage.style.width = "";
    wrap.style.width = "";
    wrap.style.height = "";
    return;
  }
  const shell = document.querySelector(".app-shell");
  const shellWidth = shell ? shell.getBoundingClientRect().width : window.innerWidth - 36;
  const available = Math.max(280, Math.min(shellWidth, window.innerWidth - 36, 1280));
  const scale = Math.min(available / 1280, 1);
  wrap.style.width = Math.ceil(1280 * scale) + "px";
  stage.style.transform = "scale(" + scale.toFixed(4) + ")";
  wrap.style.height = Math.ceil(720 * scale) + "px";
}

function normalizePage(page) {
  return ["briefing", "europa", "pais", "modelos", "marcas", "global"].includes(page) ? page : "";
}

function chrome(title, subtitle, mode, extra) {
  const country = byCountry.get(state.country);
  return '<div class="page-head">'
    + '<div><div class="kicker">Informe · Power BI</div><h1 class="page-title">' + title + '</h1><div class="page-sub">' + subtitle + '</div></div>'
    + '<div class="state-line">' + (extra || "") + '<span class="chip">' + escapeHtml(displayName(country)) + '</span><span class="chip">' + mode + '</span></div>'
    + '</div>';
}

function renderEuropa() {
  if (isMobileView()) return renderEuropaMobile();
  const page = document.getElementById("page-europa");
  page.innerHTML = chrome("Europa", "Mercado, profundidad de datos y escala externa", "fuentes oficiales")
    + '<div class="layout">'
    + '<div class="map-zone" id="eu-map"></div>'
    + '<div class="top-zone" id="eu-top"></div>'
    + '<div class="split-zone" id="eu-split"></div>'
    + '<div class="global-zone" id="eu-global"></div>'
    + '</div><div class="footer-note">Fuentes oficiales normalizadas.</div>';
  document.getElementById("eu-map").innerHTML = mapSvg(704, 420, true);
  document.getElementById("eu-top").innerHTML = top10Svg(480, 292);
  document.getElementById("eu-split").innerHTML = splitSvg(480, 96, byCountry.get("EU27") || byCountry.get(state.country), "UE27 BEV/PHEV");

function mapSvg(width, height, labels) {
  const viewBox = DATA.europeMap.viewBox;
  const mapScale = labels ? width * 0.0023 : Math.min(width * 0.0021, (height - 54) / 218);
  const mapX = labels ? 18 : 46;
  const dmax = driveMaxCountry();
  const solidFill = driveColor();
  const freshest = DATA.countries.reduce((acc, c) => (c.latest_period > acc ? c.latest_period : acc), "");
  const paths = DATA.europeMap.countries.map((shape) => {
    const country = byCountry.get(shape.code);
    const total = country ? driveCountry(country) : 0;
    const alpha = total ? 0.18 + Math.sqrt(total / dmax) * 0.72 : 0.08;
    const depth = country?.model_depth || "";
    const fill = solidFill || mix(DATA.colors.phev, DATA.colors.bev, (country?.bev_share_pct || 50) / 100);
    const selected = shape.code === state.country ? " selected" : "";
    const dash = depth === "model_rich" ? "" : ' stroke-dasharray="3 3"';

    if (country) {
      hints.push("dato de " + country.latest_period + (country.latest_period < freshest ? " (pendiente de actualizar)" : ""));
      hints.push(depth === "model_rich" ? "con ranking de modelos" : "serie de país");
      hints.push("toca para abrir el país");
    }
    const tip = country ? svgTitle(displayName(country), country.latest_bev, country.latest_phev, hints.join(" · ")) : "";
    return '<path class="country-path' + selected + '" data-country="' + shape.code + '" d="' + shape.d + '" fill="' + fill + '" fill-opacity="' + alpha.toFixed(2) + '" stroke="#ffffff" stroke-width=".65"' + dash + '>' + tip + '</path>';
  }).join("");
  const markers = labels ? DATA.top10.map((country, index) => {

      + '<text x="' + cx.toFixed(2) + '" y="' + cy.toFixed(2) + '" class="country-marker-label">' + (index + 1) + '</text>'
      + '</g>';
  }).join("") : "";
  const labelRows = labels ? DATA.top10.slice(0, 8).map((country, index) => {
    const x = 506 + (index % 2) * 78;
    const y = 32 + Math.floor(index / 2) * 28;

  return '<svg viewBox="0 0 ' + width + ' ' + height + '" width="100%" height="100%" role="img" aria-label="Mapa de Europa">'

    + paths
    + markers
    + '</g>'
    + labelRows
    + '<g transform="translate(0,' + (height - 32) + ')">'
    + (solidFill
      ? '<circle cx="8" cy="0" r="5" fill="' + solidFill + '"/><text x="20" y="4" class="micro">solo ' + (state.drive === "bev" ? "eléctricos puros (BEV)" : "híbridos enchufables (PHEV)") + '</text>'
        + '<line x1="215" y1="0" x2="245" y2="0" stroke="' + DATA.colors.ink + '" stroke-dasharray="3 3"/><text x="254" y="4" class="micro">sin ranking de modelos</text>'
      : '<circle cx="8" cy="0" r="5" fill="' + DATA.colors.bev + '"/><text x="20" y="4" class="micro">BEV alto</text>'
        + '<circle cx="98" cy="0" r="5" fill="' + DATA.colors.phev + '"/><text x="110" y="4" class="micro">PHEV alto</text>'
        + '<line x1="205" y1="0" x2="235" y2="0" stroke="' + DATA.colors.ink + '" stroke-dasharray="3 3"/><text x="244" y="4" class="micro">sin ranking de modelos</text>')
    + '<text x="0" y="20" class="micro">Más intensidad = más matriculaciones · pasa el cursor por un país para ver sus cifras</text>'
    + '</g>'
    + '</svg>';

    + '<rect x="' + bevWidth + '" y="0" width="' + phevWidth + '" height="28" fill="' + DATA.colors.phev + '"/>'
    + '<text x="10" y="19" fill="#fff" font-size="12" font-weight="800">BEV ' + Math.round((country.latest_bev / total) * 100) + '%</text>'
    + '<text x="' + (width - 12) + '" y="19" fill="#fff" font-size="12" font-weight="800" text-anchor="end">PHEV ' + Math.round((country.latest_phev / total) * 100) + '%</text>'

function globalScaleSvg(width, height, large = false) {
  const max = Math.max(...DATA.benchmarks.map((row) => Number(row.total_value)));
  const top = large ? 38 : 34;
  const rowHeight = large ? 52 : 26;
  const barX = 190;
  const barMax = width - barX - (large ? 405 : 340);

    const y = top + index * rowHeight;

    const rel = row.region_code === "EU27"

      + '<rect x="' + barX + '" y="-12" width="' + bar.toFixed(1) + '" height="' + (large ? 24 : 13) + '" fill="' + color + '"/>'
      + '<text x="' + valueX.toFixed(1) + '" y="5" class="value">' + compact.format(Number(row.total_value)) + '</text>'
      + '<text x="' + (width - 2) + '" y="5" class="micro" text-anchor="end">' + escapeHtml(rel) + '</text>'
      + '</g>';
  }).join("");
  return '<svg viewBox="0 0 ' + width + ' ' + height + '" width="100%" height="100%">'
    + '<text x="0" y="14" class="zone-label">Matriculaciones enchufables · último mes</text>'

    + '</svg>';

function rhythmSvg(width, height, code) {
  const rows = (DATA.monthlyByCountry[code] || []).slice(-30);
  if (!rows.length) return emptyState("Sin serie mensual.");
  const max = Math.max(1, ...rows.map((row) => driveVal(row.bev, row.phev, row.total)));
  const gap = 3;
  const barWidth = (width - (rows.length - 1) * gap) / rows.length;
  const axisY = height - 38;
  const tickStep = niceStep(max / 3);
  const ticks = [];
  for (let v = tickStep; v <= max; v += tickStep) ticks.push(v);
  const grid = ticks.map((v) => {
    const y = axisY - (v / max) * (height - 82);
    return '<line x1="0" y1="' + y.toFixed(1) + '" x2="' + width + '" y2="' + y.toFixed(1) + '" class="fine-line"/>';
  }).join("");
  const gridLabels = ticks.map((v) => {
    const y = axisY - (v / max) * (height - 82);
    return '<text x="0" y="' + (y - 5).toFixed(1) + '" class="micro" style="paint-order:stroke;stroke:#ffffff;stroke-width:3">' + compact.format(v) + '</text>';
  }).join("");
  const solid = driveColor();
  const bars = rows.map((row, index) => {
    const val = driveVal(row.bev, row.phev, row.total);
    const totalHeight = Math.max(2, (val / max) * (height - 82));
    const x = index * (barWidth + gap);
    const y = axisY - totalHeight;
    if (solid) {
      return '<g transform="translate(' + x.toFixed(1) + ',0)">'
        + '<rect x="0" y="' + y.toFixed(1) + '" width="' + barWidth.toFixed(1) + '" height="' + totalHeight.toFixed(1) + '" fill="' + solid + '"/>'
        + '</g>';
    }
    const bevHeight = totalHeight * (row.bev / Math.max(1, row.total));
    return '<g transform="translate(' + x.toFixed(1) + ',0)">'
      + '<rect x="0" y="' + y.toFixed(1) + '" width="' + barWidth.toFixed(1) + '" height="' + totalHeight.toFixed(1) + '" fill="' + DATA.colors.phev + '" opacity=".78"/>'
      + '<rect x="0" y="' + (axisY - bevHeight).toFixed(1) + '" width="' + barWidth.toFixed(1) + '" height="' + bevHeight.toFixed(1) + '" fill="' + DATA.colors.bev + '"/>'
      + '</g>';
  }).join("");
  const monthTicks = rows.map((row, index) => {
    if (index !== 0 && index !== rows.length - 1 && index % 6 !== 0) return "";
    const pxToLast = (rows.length - 1 - index) * (barWidth + gap);
    if (index !== 0 && index !== rows.length - 1 && pxToLast < 64) return "";
    const x = index * (barWidth + gap) + barWidth / 2;
    const anchor = index === 0 ? "start" : index === rows.length - 1 ? "end" : "middle";
    const ax = index === 0 ? 0 : index === rows.length - 1 ? width : x;
    return '<text x="' + ax.toFixed(1) + '" y="' + (height - 12) + '" class="micro" text-anchor="' + anchor + '">' + row.period + '</text>';
  }).join("");
  return '<svg viewBox="0 0 ' + width + ' ' + height + '" width="100%" height="100%">'
    + '<text x="0" y="14" class="zone-label">Ritmo mensual</text>'
    + svgLegend(width - 104, 12, [[DATA.colors.bev, "BEV"], [DATA.colors.phev, "PHEV"]])
    + grid
    + '<line x1="0" y1="' + axisY + '" x2="' + width + '" y2="' + axisY + '" class="fine-line"/>'
    + bars
    + gridLabels
    + monthTicks
    + '</svg>';
}

function niceStep(rough) {
  const pow = Math.pow(10, Math.floor(Math.log10(Math.max(1, rough))));
  const unit = rough / pow;
  const step = unit >= 5 ? 10 : unit >= 2 ? 5 : unit >= 1 ? 2 : 1;
  return step * pow;
}

function modelRunwaySvg(width, height, rows, compactMode = false) {
  const list = state.drive === "all" ? rows : [...rows].sort((a, b) => driveRow(b) - driveRow(a));
  const max = Math.max(1, ...list.map(driveRow));
  if (!compactMode) {
    const topRows = list.slice(0, 3);
    const restRows = list.slice(3);
    const podWidth = (width - 28) / 3;
    const podium = topRows.map((row, index) => {
      const x = index * (podWidth + 14);
      const val = driveRow(row);
      const bar = Math.max(18, (val / max) * (podWidth - 24));
      const sel = state.model && state.model.brand === row.brand && state.model.model === row.model;
      return '<g class="start-grid model-row' + (sel ? ' is-selected' : '') + '" data-brand="' + escapeHtml(row.brand) + '" data-model="' + escapeHtml(row.model) + '" transform="translate(' + x.toFixed(1) + ',34)">'
        + svgTitle(modelTitle(row, false), row.bev, row.phev, "Toca para ver su ficha")
        + '<rect class="hit" x="0" y="-6" width="' + podWidth.toFixed(1) + '" height="112" fill="transparent"/>'

    }).join("");
    const rowStart = 172;

    const rowSvg = restRows.map((row, index) => {
      const y = rowStart + index * laneHeight;
      const val = driveRow(row);
      const bar = Math.max(4, (val / max) * (width - 390));

        + '<text x="46" y="2" class="label">' + escapeHtml(trimLabel(title, 34)) + '</text>'
        + '<line x1="298" y1="-2" x2="318" y2="-2" stroke="' + DATA.colors.ink + '" stroke-width="1.3"/>'

      + rowSvg
      + '</svg>';

  const laneHeight = (height - 34) / list.length;
  const nameX = compactMode ? 44 : 68;
  const barX = compactMode ? 154 : 318;
  const barMax = width - barX - 72;
  const rowSvg = list.map((row, index) => {
    const y = 36 + index * laneHeight;
    const val = driveRow(row);
    const bar = Math.max(4, (val / max) * barMax);
    const title = modelTitle(row, compactMode);

function brandLanesSvg(width, height, rows, compactMode = false) {
  const list = state.drive === "all" ? rows : [...rows].sort((a, b) => driveRow(b) - driveRow(a));

    const restRows = list.slice(3);

    const podium = topRows.map((row, index) => {
      const x = index * (podWidth + 14);

      const bar = Math.max(18, (val / max) * (podWidth - 28));

        + '<text x="' + podWidth.toFixed(1) + '" y="45" class="value" text-anchor="end">' + compact.format(val) + '</text>'
        + '<text x="0" y="94" class="micro">' + row.model_count + ' modelos · ' + modelShareLabel(row) + '</text>'
        + '</g>';
    }).join("");
    const rowStart = 172;
    const laneHeight = (height - rowStart - 16) / Math.max(1, restRows.length);
    const rowSvg = restRows.map((row, index) => {
      const y = rowStart + index * laneHeight;
      const val = driveRow(row);
      const bar = Math.max(4, (val / max) * (width - 320));
      return '<g class="lane brand-row" data-brand="' + escapeHtml(row.brand) + '" transform="translate(0,' + y.toFixed(1) + ')">'

        + '<line x1="180" y1="-2" x2="202" y2="-2" stroke="' + DATA.colors.ink + '" stroke-width="1.3"/>'
        + driveBar(202, -8, bar, 12, row.bev, row.registrations)
        + '<text x="' + (width - 2) + '" y="2" class="micro" text-anchor="end">' + compact.format(val) + ' · ' + row.model_count + ' modelos</text>'
        + '</g>';
    }).join("");

      + '<text x="0" y="14" class="zone-label">Ranking de marcas</text>'
      + svgLegend(width - 104, 12, [[DATA.colors.bev, "BEV"], [DATA.colors.phev, "PHEV"]])
      + podium
      + '<line x1="0" y1="146" x2="' + width + '" y2="146" class="fine-line"/>'
      + rowSvg
      + '</svg>';
  }
  const laneHeight = (height - 34) / list.length;
  const barX = compactMode ? 120 : 210;
  const barMax = width - barX - 72;
  const rowSvg = list.map((row, index) => {
    const y = 36 + index * laneHeight;
    const val = driveRow(row);
    const bar = Math.max(4, (val / max) * barMax);
    return '<g class="lane brand-row" data-brand="' + escapeHtml(row.brand) + '" transform="translate(0,' + y.toFixed(1) + ')">'
      + svgTitle(brandLabel(row.brand), row.bev, row.phev, "Toca para ver sus modelos")

      + '<text x="30" y="2" class="label">' + escapeHtml(trimLabel(brandLabel(row.brand), compactMode ? 14 : 22)) + '</text>'

function bindMobile(root) {
  root.querySelectorAll("[data-goto-country]").forEach((el) => {
    el.addEventListener("click", () => setCountry(el.dataset.gotoCountry, "pais"));
  });
  root.querySelectorAll("[data-goto-page]").forEach((el) => {
    el.addEventListener("click", () => setPage(el.dataset.gotoPage));
  });
  root.querySelectorAll(".model-row[data-model]").forEach((el) => {
    el.addEventListener("click", () => setModel(el.dataset.brand, el.dataset.model));
  });
  root.querySelectorAll(".brand-row[data-brand]").forEach((el) => {
    el.addEventListener("click", () => setBrand(el.dataset.brand));
  });
  const cb = root.querySelector("#clearBrand");
  if (cb) cb.addEventListener("click", (event) => { event.stopPropagation(); clearBrand(); });
  const cm = root.querySelector("#clearModel");
  if (cm) cm.addEventListener("click", (event) => { event.stopPropagation(); clearModel(); });
  const select = root.querySelector("#mCountrySelect");
  if (select) select.addEventListener("change", (event) => setCountry(event.target.value, state.page));
}

function mHead(title, sub, mode, opts) {
  opts = opts || {};
  const country = byCountry.get(state.country);
  const chips = [];
  if (opts.showCountry !== false && country) chips.push('<span class="m-chip">' + escapeHtml(displayName(country)) + '</span>');
  if (mode) chips.push('<span class="m-chip">' + escapeHtml(mode) + '</span>');
  return '<header class="m-head">'
    + '<div class="m-kicker">Informe · Power BI</div>'
    + '<h1 class="m-title">' + escapeHtml(title) + '</h1>'
    + '<p class="m-sub">' + escapeHtml(sub) + '</p>'
    + (chips.length ? '<div class="m-chips">' + chips.join("") + '</div>' : '')
    + '</header>';
}

function mCard(title, bodyHtml, note) {
  return '<section class="m-card">'
    + (title ? '<h2 class="m-card-title"><span>' + escapeHtml(title) + '</span>' + (note ? '<small>' + escapeHtml(note) + '</small>' : '') + '</h2>' : '')
    + bodyHtml
    + '</section>';
}

function mKpis(items) {
  return '<div class="m-kpis">' + items.map((it) =>
    '<div class="m-kpi' + (it.accent ? ' accent' : '') + '"><b>' + escapeHtml(it.value) + '</b><span>' + escapeHtml(it.label) + '</span></div>'
  ).join("") + '</div>';
}

function mSwitcher() {
  const options = DATA.countries
    .filter((c) => c.code !== "EU27")
    .sort((a, b) => displayName(a).localeCompare(displayName(b), "es"))
    .map((c) => '<option value="' + c.code + '"' + (c.code === state.country ? ' selected' : '') + '>' + escapeHtml(displayName(c)) + '</option>')
    .join("");
  return '<label class="m-switch"><span>Mercado</span><select id="mCountrySelect" aria-label="Elegir mercado">' + options + '</select></label>';
}

function mMagBar(bev, phev, total, max) {
  const solid = driveColor();
  if (solid) {
    const val = state.drive === "bev" ? Number(bev) : Number(phev);
    const w = Math.max(4, (val / (max || 1)) * 100);
    return '<div class="m-bar"><i class="' + (state.drive === "bev" ? "bev" : "phev") + '" style="width:' + w.toFixed(1) + '%"></i></div>';
  }
  const width = Math.max(6, (total / (max || 1)) * 100);
  const drive = Math.max(1, bev + phev);
  const bevWidth = width * (bev / drive);
  return '<div class="m-bar"><i class="bev" style="width:' + bevWidth.toFixed(1) + '%"></i>'
    + '<i class="phev" style="width:' + (width - bevWidth).toFixed(1) + '%"></i></div>';
}

function mModelList(rows) {
  if (!rows.length) return '<p class="m-empty">Sin ranking público de modelos para este mercado.</p>';
  const list = state.drive === "all" ? rows : [...rows].sort((a, b) => driveRow(b) - driveRow(a));
  const max = Math.max(1, ...list.map(driveRow));
  const hot = String(state.search || "").toLowerCase();
  return mLegend([[DATA.colors.bev, "BEV · eléctrico puro"], [DATA.colors.phev, "PHEV · híbrido enchufable"]]) + '<div class="m-list">' + list.slice(0, 15).map((row, index) => {
    const total = Number(row.registrations);
    const val = driveRow(row);
    const sel = state.model && state.model.brand === row.brand && state.model.model === row.model;
    const active = (sel || (hot && String(row.model).toLowerCase() === hot)) ? " is-active" : "";
    return '<button type="button" class="m-row m-row-btn model-row' + (index < 3 ? " top" : "") + active + '" data-brand="' + escapeHtml(row.brand) + '" data-model="' + escapeHtml(row.model) + '">'
      + '<span class="m-rank-num">' + String(index + 1).padStart(2, "0") + '</span>'
      + '<div class="m-row-main"><div class="m-row-title">' + escapeHtml(modelTitle(row, false)) + '</div>'
      + '<div class="m-row-meta">' + escapeHtml(row.dominant_powertrain || "") + ' · ' + modelShareLabel(row) + '</div>'
      + mMagBar(Number(row.bev), Number(row.phev), total, max)
      + '</div>'
      + '<div class="m-row-val">' + compact.format(val) + '</div>'
      + '</button>';
  }).join("") + '</div>';
}

function mBrandList(rows) {
  if (!rows.length) return '<p class="m-empty">Sin ranking público de marcas para este mercado.</p>';
  const list = state.drive === "all" ? rows : [...rows].sort((a, b) => driveRow(b) - driveRow(a));
  const max = Math.max(1, ...list.map(driveRow));
  const hot = String(state.search || "").toLowerCase();
  return mLegend([[DATA.colors.bev, "BEV · eléctrico puro"], [DATA.colors.phev, "PHEV · híbrido enchufable"]]) + '<div class="m-list">' + list.slice(0, 15).map((row, index) => {
    const total = Number(row.registrations);
    const val = driveRow(row);
    const active = hot && String(row.brand).toLowerCase() === hot ? " is-active" : "";
    return '<button type="button" class="m-row m-row-btn brand-row' + (index < 3 ? " top" : "") + active + '" data-brand="' + escapeHtml(row.brand) + '">'
      + '<span class="m-rank-num">' + String(index + 1).padStart(2, "0") + '</span>'
      + '<div class="m-row-main"><div class="m-row-title">' + escapeHtml(brandLabel(row.brand)) + '</div>'
      + '<div class="m-row-meta">' + row.model_count + ' modelos · ' + modelShareLabel(row) + '</div>'
      + mMagBar(Number(row.bev), Number(row.phev), total, max)
      + '</div>'
      + '<div class="m-row-val">' + compact.format(val) + '</div>'
      + '</button>';
  }).join("") + '</div>';
}

function mCountryList(list) {
  if (!list.length) return '<p class="m-empty">Sin datos.</p>';
  const ordered = state.drive === "all" ? list : [...list].sort((a, b) => driveCountry(b) - driveCountry(a));
  const max = Math.max(1, ...ordered.map(driveCountry));
  return mLegend([[DATA.colors.bev, "BEV · eléctrico puro"], [DATA.colors.phev, "PHEV · híbrido enchufable"]]) + '<div class="m-list">' + ordered.map((country, index) => {
    const active = country.code === state.country ? " is-active" : "";
    const depth = country.model_depth === "model_rich" ? "con modelos" : "sin modelos";
    return '<button type="button" class="m-row m-row-btn' + (index < 3 ? " top" : "") + active + '" data-goto-country="' + country.code + '">'
      + '<span class="m-rank-num">' + String(index + 1).padStart(2, "0") + '</span>'
      + '<div class="m-row-main"><div class="m-row-title">' + escapeHtml(displayName(country)) + '</div>'
      + '<div class="m-row-meta">' + depth + ' · BEV ' + Math.round(country.bev_share_pct || 0) + '%</div>'
      + mMagBar(country.latest_bev, country.latest_phev, country.latest_total, max)
      + '</div>'
      + '<div class="m-row-val">' + compact.format(driveCountry(country)) + '</div>'
      + '</button>';
  }).join("") + '</div>';
}

function mBench() {
  const max = Math.max(...DATA.benchmarks.map((row) => Number(row.total_value)));
  return '<div class="m-bench">' + DATA.benchmarks.map((row) => {
    const value = Number(row.total_value);
    const width = Math.max(2, (value / max) * 100);
    const color = row.region_code === "EU27" ? "var(--eu)" : row.region_code === "CN" ? "var(--accent)" : "var(--us)";
    const index = Number(row.eu27_index);
    const rel = row.region_code === "EU27"
      ? "base de comparación"
      : (index / 100).toFixed(1).replace(".0", "").replace(".", ",") + "× UE27";
    return '<div class="m-bench-row">'
      + '<div class="m-bench-head"><span class="m-bench-name">' + escapeHtml(benchName(row)) + '</span>'
      + '<span class="m-bench-val">' + compact.format(value) + '</span></div>'
      + '<div class="m-bench-track"><div class="m-bench-fill" style="width:' + width.toFixed(1) + '%;background:' + color + '"></div></div>'
      + '<div class="m-bench-note">' + escapeHtml(rel) + '</div>'
      + '</div>';
  }).join("") + '</div>';
}

function mPrio(rows) {
  if (!rows.length) return '<p class="m-empty">Sin prioridades.</p>';
  return '<div class="m-prio">' + rows.map((row) => {
    const target = normalizePage(String(row.nav_page || "").toLowerCase());
    const go = target ? ' data-goto-page="' + target + '"' : "";
    return '<button type="button" class="m-prio-row"' + go + '>'
      + '<span class="m-prio-badge">' + escapeHtml(row.priority_label || ("P" + row.priority_rank)) + '</span>'
      + '<div class="m-prio-main"><div class="m-prio-title">' + escapeHtml(row.signal) + '</div>'
      + '<div class="m-prio-meta">' + escapeHtml(row.metric_label || row.period) + '</div></div>'
      + '<span class="m-prio-go">' + escapeHtml(row.nav_page || "") + ' ›</span>'
      + '</button>';
  }).join("") + '</div>';
}

function mGuide() {
  const items = [
    { page: "europa", name: "Europa", desc: "El mapa: cuántos se matriculan en cada país" },
    { page: "pais", name: "País", desc: "Los datos de un país concreto" },
    { page: "modelos", name: "Modelos", desc: "Los coches más matriculados" },
    { page: "marcas", name: "Marcas", desc: "Las marcas que más venden" },
    { page: "global", name: "Global", desc: "China y Estados Unidos, para comparar" },
  ];
  return '<div class="m-prio">' + items.map((it) =>
    '<button type="button" class="m-prio-row" data-goto-page="' + it.page + '">'
    + '<span class="m-prio-badge">' + escapeHtml(it.name) + '</span>'
    + '<div class="m-prio-main"><div class="m-prio-title">' + escapeHtml(it.desc) + '</div></div>'
    + '<span class="m-prio-go">ver ›</span>'
    + '</button>'
  ).join("") + '</div>';
}

function mSignals(rows) {
  return '<div class="m-signals">' + rows.map((row) =>
    '<div class="m-signal"><div class="m-signal-sec">' + escapeHtml(row.section) + '</div>'
    + '<div class="m-signal-title">' + escapeHtml(row.signal) + '</div>'
    + '<div class="m-signal-copy">' + escapeHtml(row.narrative) + '</div>'
    + '<div class="m-signal-metric">' + escapeHtml(row.metric_label || row.period) + '</div></div>'
  ).join("") + '</div>';
}

function benchName(row) {
  const map = { EU27: "Unión Europea (UE27)", CN: "China", US: "Estados Unidos" };
  return map[row.region_code] || row.display_name;
}

function countryYoY(code) {
  const rows = DATA.monthlyByCountry[code] || [];
  if (!rows.length) return null;
  const last = rows[rows.length - 1];
  const [year, month] = String(last.period).split("-");
  const priorYear = String(Number(year) - 1);
  const prior = rows.find((row) => row.period === priorYear + "-" + month);
  if (!prior || !prior.total) return null;
  return { priorYear, pct: ((last.total - prior.total) / prior.total) * 100 };
}

function bevSharePct(country) {
  if (country && Number(country.bev_share_pct)) return Number(country.bev_share_pct).toFixed(0);
  const total = Math.max(1, (country && country.latest_total) || 0);
  return Math.round((((country && country.latest_bev) || 0) / total) * 100);
}

function fmtPct(value) {
  return Number(value).toFixed(1).replace(".", ",") + "%";
}

function emptyState(text) {
  return '<div class="empty">' + escapeHtml(text) + '</div>';
}

function svgLegend(x, y, pairs) {
  let cx = x;
  return pairs.map((p) => {
    const g = '<g transform="translate(' + cx.toFixed(1) + ',' + y + ')">'
      + '<rect x="0" y="-7" width="9" height="9" rx="2" fill="' + p[0] + '"/>'
      + '<text x="13" y="2" class="micro">' + escapeHtml(p[1]) + '</text></g>';
    cx += 13 + String(p[1]).length * 5.6 + 16;
    return g;
  }).join("");
}

function mLegend(pairs) {
  return '<div class="m-legend">' + pairs.map((p) =>
    '<span><i style="background:' + p[0] + '"></i>' + escapeHtml(p[1]) + '</span>'
  ).join("") + '</div>';
}

function coverageText(country) {
  if (country.model_depth === "model_rich") {
    return "Con ranking de modelos y marcas. " + country.accepted_public_models + " modelos publicados.";
  }
  if (country.model_depth === "definition_gate") return "Serie de país lista. Falta separar el desglose por definición.";
  if (country.model_depth === "aggregate_ready") return "Serie de país comparable. Ranking de modelos aún no publicado.";
  return "Volumen base. Detalle ampliable cuando haya corte oficial suficiente.";
}

function modelTitle(row, compactMode) {
  const brand = brandLabel(row.brand);
  const rawBrand = String(row.brand || "");
  let model = modelLabel(row.model);
  if (model.toLowerCase().startsWith(rawBrand.toLowerCase() + " ")) {
    model = model.slice(rawBrand.length).trim();
  }
  return compactMode ? model : brand + " " + model;
}

function brandLabel(value) {
  const text = String(value || "");
  const normalized = {
    Byd: "BYD",
    Bmw: "BMW",
    Mg: "MG",
    Mini: "MINI",
    Xpeng: "XPeng",
  };
  return normalized[text] || text;
}

function modelLabel(value) {
  return String(value || "")
    .replace(/\bDm-I\b/gi, "DM-i")
    .replace(/\bPhev\b/gi, "PHEV")
    .replace(/\bEv([0-9])\b/gi, "EV$1")
    .replace(/\bC-Hr\b/gi, "C-HR")
    .replace(/\bGlc\b/gi, "GLC")
    .replace(/\bGla\b/gi, "GLA")
    .replace(/\bXdrive\b/gi, "xDrive");
}

function trimLabel(value, max) {
  const text = String(value || "");
  return text.length > max ? text.slice(0, max - 1) + "..." : text;
}

function mix(hexA, hexB, t) {
  const a = hexToRgb(hexA);
  const b = hexToRgb(hexB);
  const clamped = Math.max(0, Math.min(1, t));
  return "#" + [0, 1, 2].map((i) => Math.round(a[i] + (b[i] - a[i]) * clamped).toString(16).padStart(2, "0")).join("");
}

function hexToRgb(hex) {
  return [1, 3, 5].map((start) => parseInt(hex.slice(start, start + 2), 16));
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
}
</script>
